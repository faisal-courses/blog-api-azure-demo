name: Trigger auto deployment for blog-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/blog-api-AutoDeployTrigger-4f1bfbf1-c6ef-47aa-948d-03980db98052.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BLOGAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BLOGAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BLOGAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: blogapiacr.azurecr.io
          registryUsername: ${{ secrets.BLOGAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BLOGAPI_REGISTRY_PASSWORD }}
          containerAppName: blog-api
          resourceGroup: blog-api-rg
          imageToBuild: blogapiacr.azurecr.io/blog-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


